<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Trusted Advisor{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css" />
  <style>
    body { display: block; background: var(--slate-050); }
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .auth-card { width: 100%; max-width: 420px; }
    .auth-brand { display: flex; align-items: center; gap: 0.6rem; justify-content: center; margin-bottom: 1.5rem; }
    .auth-brand .brand-mark { width: 34px; height: 34px; font-size: 12px; }
    .auth-brand .brand-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .auth-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; }
    .auth-title { font-size: 1.2rem; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 0.3rem; }
    .auth-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; }
    .auth-error { background: #FEF2F2; color: #991B1B; font-size: 13px; padding: 0.65rem 0.85rem; border-radius: var(--radius); margin-bottom: 1.25rem; }
    .auth-foot { text-align: center; font-size: 12.5px; color: var(--text-muted); margin-top: 1.25rem; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="brand-mark">TA</span>
        <span class="brand-name">Trusted Advisor</span>
      </div>
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
