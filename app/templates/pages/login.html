{% extends "auth_base.html" %}
{% block title %}Sign in — Trusted Advisor{% endblock %}

{% block content %}
<div class="auth-panel">
  <h1 class="auth-title">Sign in</h1>
  <p class="auth-sub">Welcome back. Enter your credentials to continue.</p>

  {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}

  <form method="post" action="/auth/login">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" value="{{ username or '' }}" autofocus required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem;">Sign in</button>
  </form>
</div>
{% endblock %}
