<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Trusted Advisor{% endblock %}</title>

  <link rel="icon" href="/static/img/favicon.png" type="image/png" />

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>

  <!-- Design system -->
  <link rel="stylesheet" href="/static/css/main.css" />

  {% block head %}{% endblock %}
</head>
<body>

  <!-- Mobile top bar (shown only on small screens) -->
  <div class="mobile-bar">
    <button class="mobile-bar-toggle" onclick="toggleNav()" aria-label="Open navigation">
      <span></span><span></span><span></span>
    </button>
    <div class="mobile-bar-brand">
      <img class="brand-mark" src="/static/img/mark.png" alt="" />
      <span class="brand-name">Trusted Advisor</span>
    </div>
  </div>

  <!-- Overlay behind the drawer on mobile -->
  <div id="nav-overlay" class="nav-overlay" onclick="toggleNav()"></div>

  <!-- Sidebar navigation -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img class="brand-mark" src="/static/img/mark.png" alt="" />
      <span class="brand-name">Trusted Advisor</span>
    </div>

    <ul class="nav-links">
      <li><a href="/"            class="nav-link {% block nav_dashboard %}{% endblock %}">Dashboard</a></li>
      <li><a href="/contacts"    class="nav-link {% block nav_contacts %}{% endblock %}">Contacts</a></li>
      <li><a href="/interactions" class="nav-link {% block nav_interactions %}{% endblock %}">Interactions</a></li>
      <li><a href="/insights"    class="nav-link {% block nav_insights %}{% endblock %}">Insights</a></li>
      <li><a href="/actions"     class="nav-link {% block nav_actions %}{% endblock %}">Actions</a></li>
    </ul>

    <div class="sidebar-footer">
      <form method="post" action="/auth/logout" style="margin: 0;">
        <button type="submit" class="nav-link" style="background: none; border: none; width: 100%; text-align: left; cursor: pointer; font: inherit;">Sign out</button>
      </form>
    </div>
  </nav>

  <!-- Main content area -->
  <main class="main-content">
    <!-- Flash messages (HTMX-friendly).
         `messages` is an optional list of {category, text} dicts passed
         in the template context. FastAPI has no built-in flash, so routes
         pass this explicitly when needed. -->
    <div id="flash-region" aria-live="polite">
      {% for msg in messages | default([]) %}
        <div class="flash flash--{{ msg.category }}">{{ msg.text }}</div>
      {% endfor %}
    </div>

    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}

  <script>
    // Mobile nav drawer toggle. Full-page navigation resets state, so we only
    // need open/close here.
    function toggleNav() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('nav-overlay').classList.toggle('show');
    }
  </script>
</body>
</html>
