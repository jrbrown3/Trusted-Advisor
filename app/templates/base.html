<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Trusted Advisor{% endblock %}</title>

  <link rel="icon" href="/static/img/favicon.png" type="image/png" />

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>

  <!-- Design system -->
  <link rel="stylesheet" href="/static/css/main.css" />

  {% block head %}{% endblock %}
</head>
<body>

  <!-- Mobile top bar (shown only on small screens) -->
  <div class="mobile-bar">
    <button class="mobile-bar-toggle" onclick="toggleNav()" aria-label="Open navigation">
      <span></span><span></span><span></span>
    </button>
    <div class="mobile-bar-brand">
      <img class="brand-mark" src="/static/img/mark.png" alt="" />
      <span class="brand-name">Trusted Advisor</span>
    </div>
  </div>

  <!-- Overlay behind the drawer on mobile -->
  <div id="nav-overlay" class="nav-overlay" onclick="toggleNav()"></div>

  <!-- Sidebar navigation -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img class="brand-mark" src="/static/img/mark.png" alt="" />
      <span class="brand-name">Trusted Advisor</span>
    </div>

    <ul class="nav-links">
      <li><a href="/"            class="nav-link {% block nav_dashboard %}{% endblock %}">Dashboard</a></li>
      <li><a href="/contacts"    class="nav-link {% block nav_contacts %}{% endblock %}">Contacts</a></li>
      <li><a href="/interactions" class="nav-link {% block nav_interactions %}{% endblock %}">Interactions</a></li>
      <li><a href="/insights"    class="nav-link {% block nav_insights %}{% endblock %}">Insights</a></li>
      <li><a href="/actions"     class="nav-link {% block nav_actions %}{% endblock %}">Actions</a></li>
    </ul>

    <div class="sidebar-footer">
      <a href="/settings" class="icon-btn {% block nav_settings %}{% endblock %}" title="Settings" aria-label="Settings">
        <!-- gear icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span class="icon-btn-label">Settings</span>
      </a>

      <form method="post" action="/auth/logout" style="margin: 0;">
        <button type="submit" class="icon-btn" title="Sign out" aria-label="Sign out">
          <!-- log-out arrow icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span class="icon-btn-label">Sign out</span>
        </button>
      </form>
    </div>
  </nav>

  <!-- Main content area -->
  <main class="main-content">
    <!-- Flash messages (HTMX-friendly).
         `messages` is an optional list of {category, text} dicts passed
         in the template context. FastAPI has no built-in flash, so routes
         pass this explicitly when needed. -->
    <div id="flash-region" aria-live="polite">
      {% for msg in messages | default([]) %}
        <div class="flash flash--{{ msg.category }}">{{ msg.text }}</div>
      {% endfor %}
    </div>

    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}

  <script>
    // Mobile nav drawer toggle. Full-page navigation resets state, so we only
    // need open/close here.
    function toggleNav() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('nav-overlay').classList.toggle('show');
    }
  </script>
</body>
</html>
